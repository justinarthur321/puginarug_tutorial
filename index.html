<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pugilla Challenge Edition</title>
  <meta name="description" content="Watch the pug animation and explore the Pugilla Challenge Edition.">

  <style>
    /* Make the page fill the browser window */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: monospace;
      background: #f4f1ec;
    }

    /* The canvas is the big drawing area for the pugs */
    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }

    /*
      This banner sits in front of the canvas, so the pugs stay behind it.
      We keep this version simple and static so it does not interfere with
      the JavaScript animation running on the canvas.
    */
    .challenge-banner {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      width: min(820px, calc(100vw - 24px));
      box-sizing: border-box;
      padding: 16px 18px;
      text-align: center;
      overflow: hidden;
      border: 3px solid #00cc66;
      border-radius: 14px;
      background: linear-gradient(180deg, #081408 0%, #031003 100%);
      box-shadow: 0 0 18px rgba(0, 255, 100, 0.22);
      font-family: monospace;
      color: #d8ffd8;
    }

    /*
      This faint text pattern gives the banner a Matrix-like code feel
      without adding another moving animation layer.
    */
    .challenge-banner::before {
      content:
        "101101 010011 const pug = true; canvas.drawImage(pug, x, y); 010101 "
        "if (pug) { honor++; } function learn() { save(); refresh(); } "
        "let level = 'challenge'; return 'Pugilla'; 110010 001111";
      position: absolute;
      inset: 0;
      padding: 8px 12px;
      color: rgba(120, 255, 120, 0.14);
      font-size: 13px;
      line-height: 1.15;
      white-space: pre-wrap;
      word-break: break-word;
      pointer-events: none;
      text-shadow: 0 0 6px rgba(0, 255, 0, 0.28);
    }

    /*
      These text elements sit above the decorative code background.
    */
    .challenge-banner strong,
    .challenge-banner span {
      position: relative;
      z-index: 1;
    }

    .challenge-banner strong {
      display: block;
      margin-bottom: 6px;
      font-size: 20px;
      color: #7dff7d;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-shadow: 0 0 8px rgba(0, 255, 80, 0.5);
    }

    .challenge-banner span {
      font-size: 14px;
      line-height: 1.35;
    }

    /* The timer box sits on top of the canvas */
    .timer {
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      width: min(520px, calc(100vw - 24px));
      text-align: center;
      z-index: 10;
    }

    .inner {
      background: rgba(255, 255, 255, 0.78);
      border: 3px solid #222;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
    }

    .timer span {
      font-weight: bold;
    }

    .sitter {
      position: fixed;
      bottom: 16px;
      z-index: 10;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
    }

    .left {
      left: 16px;
    }

    .right {
      right: 16px;
    }

    .watch {
      display: inline-block;
      background: rgba(255, 255, 255, 0.7);
      color: #111;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 999px;
      border: 2px solid #222;
    }

    .watch:hover {
      background: rgba(255, 255, 255, 0.92);
    }

    @media (max-width: 700px) {
      .sitter {
        display: none;
      }

      .challenge-banner {
        top: 10px;
        padding: 14px 14px;
      }

      .challenge-banner strong {
        font-size: 17px;
      }

      .challenge-banner span {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <!--
    This canvas is a blank drawing surface.
    JavaScript will paint the pug image here over and over.
  -->
  <canvas></canvas>

  <!--
    This banner shows that this is the Pugilla Challenge version.
    It has a Matrix-inspired code look, but it is static so the pug
    animation on the canvas can keep running normally behind it.
  -->
  <div class="challenge-banner">
    <strong>Pugilla Challenge Edition</strong>
    <span>This challenge version was rebranded from the original project and has its own code-inspired style.</span>
  </div>

  <!--
    This box contains text that JavaScript updates while the page is running.
    The class names below are important because index.js looks them up.
  -->
  <div class="timer">
    <div class="inner">
      You have been honoring the pug for <span class="seconds">0</span> seconds<br>
      You are a <span class="grade">Assistant</span> of pug
    </div>
  </div>

  <!-- These links are just extra decorations in the corners -->
  <div class="sitter left">
    <a class="watch" href="https://www.youtube.com/watch?v=Sj1vbbRA07g" target="_blank" rel="noreferrer">
      watch me making this
    </a>
  </div>

  <div class="sitter right">
    <a class="watch" href="https://theuselessweb.com/" target="_blank" rel="noreferrer">
      A Useless Web Project
    </a>
  </div>

  <!--
    This line connects the HTML file to the JavaScript file.
    When the browser reaches this line, it loads and runs index.js.
  -->
  <script src="./index.js"></script>
</body>
</html>
