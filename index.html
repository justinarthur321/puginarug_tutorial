<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Pug In A Rugy Rug Rug</title>
  <meta name="description" content="Watch the Pug be in the Rug. Level up and maximize!">

  <style>
    /* Make the page fill the browser window */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: monospace;
      background: #f4f1ec;
    }

    /* The canvas is the big drawing area for the pugs */
    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }

    /* The timer box sits on top of the canvas */
    .timer {
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      width: min(520px, calc(100vw - 24px));
      text-align: center;
      z-index: 10;
    }

    .inner {
      background: rgba(255, 255, 255, 0.78);
      border: 3px solid #222;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
    }

    .timer span {
      font-weight: bold;
    }

    .sitter {
      position: fixed;
      bottom: 16px;
      z-index: 10;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
    }

    .left {
      left: 16px;
    }

    .right {
      right: 16px;
    }

    .watch {
      display: inline-block;
      background: rgba(255, 255, 255, 0.7);
      color: #111;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 999px;
      border: 2px solid #222;
    }

    .watch:hover {
      background: rgba(255, 255, 255, 0.92);
    }

    @media (max-width: 700px) {
      .sitter {
        display: none;
      }
    }
  </style>
</head>
<body>
  <!--
    This canvas is a blank drawing surface.
    JavaScript will paint the pug image here over and over.
  -->
  <canvas></canvas>

  <!--
    This box contains text that JavaScript updates while the page is running.
    The class names below are important because index.js looks them up.
  -->
  <div class="timer">
    <div class="inner">
      The Pug is very pleased with Jasmine
      You have been honoring the pug for <span class="seconds">0</span> seconds<br>
      You are a <span class="grade">Assistant</span> of pug
    </div>
  </div>

  <!-- These links are just extra decorations in the corners -->
  <div class="sitter left">
    <a class="watch" href="https://www.youtube.com/watch?v=Sj1vbbRA07g" target="_blank" rel="noreferrer">
      watch me making this
    </a>
  </div>

  <div class="sitter right">
    <a class="watch" href="https://theuselessweb.com/" target="_blank" rel="noreferrer">
      A Useless Web Project
    </a>
  </div>

  <!--
    This line connects the HTML file to the JavaScript file.
    When the browser reaches this line, it loads and runs index.js.
  -->
  <script src="./index.js"></script>
</body>
</html>
